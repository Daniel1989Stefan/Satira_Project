<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resetare Parolă Admin | Ziarul cu Minciuni</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .auth-container {
        max-width: 400px;
        margin: 80px auto;
        background: var(--bg-card);
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
        text-align: center;
      }
    </style>
  </head>
  <body style="background-color: var(--bg-color)">
    <main class="auth-container">
      <i
        class="fa-solid fa-envelope-open-text text-warning"
        style="font-size: 40px; margin-bottom: 15px"
      ></i>
      <h2 style="margin-bottom: 10px">Ai uitat parola?</h2>
      <p class="text-muted" style="margin-bottom: 25px; font-size: 14px">
        Introdu adresa de email a administratorului și îți vom trimite un link
        securizat pentru resetare.
      </p>

      <form id="form-forgot-password">
        <div class="form-group mb-15" style="text-align: left">
          <label class="form-label font-bold">Email Admin</label>
          <input
            type="email"
            id="input-email"
            class="input-full"
            required
            placeholder="admin@exemplu.ro"
          />
        </div>
        <div
          id="status-message"
          style="
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
            display: none;
          "
        ></div>
        <button
          type="submit"
          class="btn-primary btn-full"
          style="padding: 12px; border: none; background-color: #f39c12"
        >
          <i class="fa-solid fa-paper-plane"></i> Trimite Link-ul
        </button>
      </form>

      <div style="margin-top: 20px">
        <a
          href="login-admin.html"
          style="
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
          "
          ><i class="fa-solid fa-arrow-left"></i> Înapoi la Autentificare</a
        >
      </div>
    </main>
    <script src="../../js/api.js"></script>
    <script src="../../js/admin/forgot-password.js"></script>
  </body>
</html>
