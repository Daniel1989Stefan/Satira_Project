<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Setare Noua Parolă | Ziarul cu Minciuni</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .auth-container {
        max-width: 400px;
        margin: 80px auto;
        background: var(--bg-card);
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
        text-align: center;
      }
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .password-wrapper input {
        padding-right: 40px;
      }
      .password-toggle-icon {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body style="background-color: var(--bg-color)">
    <main class="auth-container">
      <i
        class="fa-solid fa-shield-halved text-success"
        style="font-size: 40px; margin-bottom: 15px"
      ></i>
      <h2 style="margin-bottom: 25px">Setează o parolă nouă</h2>

      <div
        id="status-message"
        style="
          margin-bottom: 15px;
          font-weight: bold;
          font-size: 14px;
          display: none;
        "
      ></div>

      <form id="form-reset-password">
        <div class="form-group mb-15" style="text-align: left">
          <label class="form-label font-bold">Noua Parolă</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="input-new-password"
              class="input-full"
              required
              minlength="12"
            />
            <i class="fa-solid fa-eye password-toggle-icon toggle-pw"></i>
          </div>
          <small class="text-muted" style="font-size: 11px"
            >Minim 12 caractere, litere mari/mici, cifre și caractere
            speciale.</small
          >
        </div>

        <div class="form-group mb-20" style="text-align: left">
          <label class="form-label font-bold">Confirmă Parola</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="input-confirm-password"
              class="input-full"
              required
              minlength="12"
            />
            <i class="fa-solid fa-eye password-toggle-icon toggle-pw"></i>
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary btn-full"
          style="padding: 12px; border: none; background-color: #28a745"
        >
          <i class="fa-solid fa-check"></i> Salvează Parola
        </button>
      </form>
    </main>
    <script src="../../js/api.js"></script>
    <script src="../../js/admin/reset-password.js"></script>
  </body>
</html>
