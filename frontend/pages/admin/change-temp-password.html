<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Securitate Cont | Ziarul cu Minciuni</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="../../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .auth-container {
        max-width: 450px;
        margin: 60px auto;
        background: var(--bg-card);
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
        text-align: center;
      }
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .password-wrapper input {
        padding-right: 40px;
      }
      .password-toggle-icon {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body style="background-color: var(--bg-color)">
    <main class="auth-container">
      <i
        class="fa-solid fa-triangle-exclamation text-error"
        style="font-size: 40px; margin-bottom: 15px"
      ></i>
      <h2 style="margin-bottom: 10px">Schimbare Obligatorie</h2>
      <p class="text-muted" style="margin-bottom: 25px; font-size: 14px">
        Contul tău a fost resetat. Pentru a continua, trebuie să schimbi parola
        temporară cu una permanentă.
      </p>

      <div
        id="status-message"
        style="
          margin-bottom: 15px;
          font-weight: bold;
          font-size: 14px;
          display: none;
        "
      ></div>

      <form id="form-temp-password">
        <div class="form-group mb-15" style="text-align: left">
          <label class="form-label font-bold">Email Admin</label>
          <input type="email" id="input-email" class="input-full" required />
        </div>

        <div class="form-group mb-15" style="text-align: left">
          <label class="form-label font-bold"
            >Parolă Temporară (primită / generată)</label
          >
          <div class="password-wrapper">
            <input
              type="password"
              id="input-temp-password"
              class="input-full"
              required
            />
            <i class="fa-solid fa-eye password-toggle-icon toggle-pw"></i>
          </div>
        </div>

        <div
          style="height: 1px; background: var(--border-color); margin: 20px 0"
        ></div>

        <div class="form-group mb-15" style="text-align: left">
          <label class="form-label font-bold">Noua Parolă Permanentă</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="input-new-password"
              class="input-full"
              required
              minlength="12"
            />
            <i class="fa-solid fa-eye password-toggle-icon toggle-pw"></i>
          </div>
        </div>

        <div class="form-group mb-20" style="text-align: left">
          <label class="form-label font-bold">Confirmă Noua Parolă</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="input-confirm-password"
              class="input-full"
              required
              minlength="12"
            />
            <i class="fa-solid fa-eye password-toggle-icon toggle-pw"></i>
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary btn-full"
          style="padding: 12px; border: none; background-color: #dc3545"
        >
          <i class="fa-solid fa-lock"></i> Actualizează și Deblochează Contul
        </button>
      </form>
    </main>
    <script src="../../js/api.js"></script>
    <script src="../../js/admin/change-temp-password.js"></script>
  </body>
</html>
