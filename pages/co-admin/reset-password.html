<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Co-Admin - Setează Parolă Nouă | Ziarul cu Minciuni</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .reset-container {
        background: var(--bg-card);
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .reset-icon {
        font-size: 50px;
        color: var(--text-main);
        margin-bottom: 20px;
      }
      .error-message,
      .success-message {
        display: none;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        font-size: 14px;
        font-weight: bold;
      }
      .error-message {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .success-message {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      /* Stiluri noi pentru vizualizarea parolei */
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .password-wrapper input {
        padding-right: 40px; /* Facem loc pentru iconiță */
      }
      .password-toggle-icon {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: var(--text-muted);
        transition: color 0.3s ease;
      }
      .password-toggle-icon:hover {
        color: var(--text-main);
      }
    </style>
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-icon">
        <i class="fa-solid fa-unlock-keyhole"></i>
      </div>
      <h2 style="margin-bottom: 10px">Setare Parolă Nouă</h2>
      <p class="text-muted" style="margin-bottom: 25px; font-size: 14px">
        Te rugăm să introduci o parolă sigură pentru a-ți activa contul de
        Co-Admin.
      </p>

      <div id="status-error" class="error-message"></div>
      <div id="status-success" class="success-message"></div>

      <form id="form-reset-password">
        <div class="form-group" style="text-align: left; margin-bottom: 15px">
          <label class="form-label" style="display: block; margin-bottom: 5px"
            >Noua Parolă</label
          >
          <div class="password-wrapper">
            <input
              type="password"
              id="input-password"
              class="input-full"
              placeholder="Introdu parola"
              required
              minlength="12"
            />
            <i
              class="fa-solid fa-eye password-toggle-icon"
              id="toggle-password"
            ></i>
          </div>
          <small
            style="
              color: var(--text-muted);
              font-size: 12px;
              display: block;
              margin-top: 5px;
            "
          >
            Min. 12 caractere, o majusculă, o minusculă, o cifră și un caracter
            special.
          </small>
        </div>

        <div class="form-group" style="text-align: left; margin-bottom: 25px">
          <label class="form-label" style="display: block; margin-bottom: 5px"
            >Confirmă Parola</label
          >
          <div class="password-wrapper">
            <input
              type="password"
              id="input-confirm-password"
              class="input-full"
              placeholder="Confirmă parola"
              required
              minlength="6"
            />
            <i
              class="fa-solid fa-eye password-toggle-icon"
              id="toggle-confirm-password"
            ></i>
          </div>
        </div>

        <button
          type="submit"
          id="btn-submit"
          class="btn-primary btn-full"
          style="padding: 12px; font-size: 16px"
        >
          Salvează și Activează Contul
        </button>
      </form>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/co-admin/reset-password.js"></script>
  </body>
</html>
