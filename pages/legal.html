<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documente Legale | Ziarul cu Minciuni</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body class="legal-page">
    <header class="navbar">
      <div class="navbar-top">
        <div class="nav-container-inner">
          <div class="nav-left">
            <button id="hamburger-btn" class="hamburger-btn">
              <i class="fa-solid fa-bars"></i>
            </button>
            <a
              href="https://www.buymeacoffee.com/stefan.danca.dev"
              target="_blank"
              class="nav-bmac-link"
            >
              <img
                src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png"
                alt="Buy Me A Coffee"
                class="nav-bmac-img"
              />
            </a>
          </div>

          <div class="nav-center">
            <a href="../index.html">
              <img
                src="../img/logo.svg"
                alt="Satira Logo"
                class="site-logo logo-day"
              />
              <img
                src="../img/logo-dark.svg"
                alt="Satira Logo"
                class="site-logo logo-night"
              />
            </a>
          </div>

          <div class="nav-right">
            <div class="nav-right-actions">
              <button id="theme-toggle" class="theme-toggle-btn">
                <img
                  src="../img/light-mode.svg"
                  class="icon-zi icon-desktop"
                  alt="Mod Zi"
                />
                <img
                  src="../img/dark-mode.svg"
                  class="icon-noapte icon-desktop"
                  alt="Mod Noapte"
                />
                <img
                  src="../img/light-mode-mobil.svg"
                  alt="Zi Mobil"
                  class="icon-zi icon-mobil"
                />
                <img
                  src="../img/dark-mode-mobil.svg"
                  alt="Noapte Mobil"
                  class="icon-noapte icon-mobil"
                />
              </button>

              <div id="user-menu-top">
                <a
                  href="../index.html"
                  id="special-action-btn"
                  class="nav-btn-special"
                >
                  <i class="fa-solid fa-house"></i> <span>Înapoi la Site</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <nav id="sidebar-menu" class="sidebar-menu">
      <div class="sidebar-header">
        <h3>Meniu</h3>
        <button id="close-sidebar-btn" class="close-sidebar-btn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="sidebar-content" id="sidebar-content-area">
        <a href="../index.html" class="sidebar-item font-bold"
          >🏠 Toate Postările</a
        >
        <button
          id="toggle-categories-btn"
          class="sidebar-item sidebar-btn font-bold"
        >
          <span>📂 Postări pe Categorii</span>
          <span id="toggle-icon" class="toggle-icon">▼</span>
        </button>
        <div id="sidebar-categories-list"></div>
        <div class="sidebar-auth-links-container">
          <a href="../index.html" class="sidebar-item font-bold border-none"
            ><i class="fa-solid fa-house"></i> Înapoi la Site</a
          >
        </div>
      </div>
    </nav>

    <main class="legal-content-wrapper">
      <div class="legal-card">
        <h1 id="legal-title" class="legal-title">Se încarcă...</h1>
        <div id="legal-body" class="legal-body-text">
          <p>
            <i class="fa-solid fa-spinner fa-spin"></i> Preluăm datele din
            server...
          </p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-section footer-left">
          <h3>Disclaimer</h3>
          <p id="footer-disclaimer-text">Se încarcă...</p>
        </div>

        <div class="footer-section footer-center">
          <h3 id="footer-support-title">Susține Proiectul</h3>
          <p id="footer-support-desc" class="mb-15">Se încarcă...</p>

          <a
            href="https://www.buymeacoffee.com/stefan.danca.dev"
            target="_blank"
            class="bmac-footer-btn"
          >
            <i class="fa-solid fa-mug-hot bmac-icon"></i> Buy me a Coffee
          </a>
        </div>

        <div class="footer-section footer-right">
          <h3>Contact</h3>
          <div id="footer-contact-container">
            <p>Se încarcă...</p>
          </div>
        </div>
      </div>

      <div class="footer-bottom" id="footer-copyright-text">
        &copy; 2026 Ziarul cu Minciuni. Toate drepturile rezervate.
      </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/legal.js"></script>
  </body>
</html>
