<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Creează Co-Admin | Ziarul cu Minciuni</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body style="background-color: var(--bg-color)">
    <header class="navbar" style="width: 100%">
      <div class="navbar-top">
        <div class="nav-left">
          <div
            class="logo font-bold"
            style="color: var(--text-main); font-size: 20px"
          >
            🛡️ Adăugare Membru Nou
          </div>
        </div>
        <div class="nav-right">
          <div class="nav-right-actions">
            <a href="co-admins-list.html" class="nav-btn-special">
              <i class="fa-solid fa-arrow-left"></i>
              <span>Înapoi la Echipă</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main
      class="editor-container"
      style="margin-top: 40px; margin-bottom: 60px; max-width: 600px"
    >
      <div class="text-center mb-20">
        <h1>
          <i class="fa-solid fa-envelope-open-text text-info"></i> Invită un
          Co-Admin
        </h1>
        <p class="text-muted">
          Introdu datele Co-Adminului. Sistemul îi va trimite automat un email
          securizat pentru a-și seta parola.
        </p>
      </div>

      <div
        class="form-container"
        style="
          background: var(--bg-card);
          padding: 30px;
          border-radius: 8px;
          border: 1px solid var(--border-color);
        "
      >
        <form id="create-coadmin-form">
          <div class="form-group mb-15">
            <label class="form-label font-bold" for="fullname"
              >Nume Complet</label
            >
            <input
              type="text"
              id="fullname"
              class="input-full"
              placeholder="Ex: Ion Popescu"
              required
            />
          </div>

          <div class="form-group mb-15">
            <label class="form-label font-bold" for="email"
              >Adresă de Email</label
            >
            <input
              type="email"
              id="email"
              class="input-full"
              placeholder="colegul@exemplu.ro"
              required
            />
          </div>

          <div class="form-group mb-20">
            <label class="form-label font-bold" for="confirmEmail"
              >Confirmă Adresa de Email</label
            >
            <input
              type="email"
              id="confirmEmail"
              class="input-full"
              placeholder="Rescrie adresa de email"
              required
            />
          </div>

          <div id="message-box" class="message-box mb-15"></div>

          <button
            type="submit"
            class="btn-primary btn-full"
            style="padding: 12px; font-size: 16px"
          >
            <i class="fa-solid fa-paper-plane"></i> Trimite Invitația
          </button>
        </form>
      </div>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin/create-co-admin.js"></script>
  </body>
</html>
