<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Categorii | Ziarul cu Minciuni</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="../../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body style="background-color: var(--bg-color)">
    <header class="navbar" style="width: 100%">
      <div class="navbar-top">
        <div class="nav-left">
          <div
            class="logo font-bold"
            style="color: var(--text-main); font-size: 20px"
          >
            📁 Toate Categoriile
          </div>
        </div>
        <div class="nav-right">
          <div class="nav-right-actions">
            <a href="manage-posts.html" class="nav-btn-special">
              <i class="fa-solid fa-arrow-left"></i>
              <span>Înapoi la Dashboard</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main
      class="editor-container"
      style="margin-top: 40px; margin-bottom: 60px; max-width: 600px"
    >
      <div class="text-center mb-20">
        <h1>Categorii Disponibile</h1>
        <p class="text-muted">
          Alege o categorie pentru a vedea postările asociate.
        </p>
      </div>

      <div
        id="categories-container"
        style="display: flex; flex-direction: column; gap: 10px"
      >
        <p class="text-center text-muted">Se încarcă lista... ⏳</p>
      </div>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin/categories-list.js"></script>
  </body>
</html>
